<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Online</title>
    <style>
      body { font-family: Georgia, serif; margin: 0; background: #f8f5ea; color: #23201a; overflow-x: hidden; overflow-y: auto; }
      .page { width: 100%; max-width: none; margin: 0; padding: 0.5rem 0.8rem 0.8rem; box-sizing: border-box; line-height: 1.3; }
      .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 1rem; align-items: start; }
      .chronicles-column { background: #f3ebd8; border: 1px solid #d2c5a3; padding: 0.75rem; }
      .chronicles-column h3 { margin: 0.25rem 0 0.5rem; }
      .options-column { min-width: 0; }
      .stats { display: grid; gap: 0.55rem; }
      .stats-box { background: #efe7d2; border: 1px dashed #8b7b57; padding: 0.6rem 0.75rem; }
      .stats-columns { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(260px, 1fr); gap: 1.2rem; align-items: start; }
      .stat-group h4 { margin: 0 0 0.35rem; font-size: 1rem; color: #2d271a; text-transform: uppercase; letter-spacing: 0.03em; }
      .stat-group-status, .stat-group-supplies, .stat-group-farm, .stat-group-progress { min-width: 0; border-left: 1px solid #7b6a45; border-right: 1px solid #7b6a45; padding: 0 0.35rem; }
      .stat-stack { display: grid; gap: 0.5rem; }
      .stat-divider { border-top: 1px dashed #8b7b57; margin: 0.1rem 0 0.2rem; }
      .stat-row { display: inline-flex; align-items: baseline; justify-content: flex-start; gap: 0; max-width: 100%; }
      .stat-row span:last-child::before { content: "("; color: #5f5238; }
      .stat-row span:last-child::after { content: ") |"; color: #5f5238; }
      .label { color: #3a3221; }
      .label.key { font-weight: 700; color: #2e271a; }
      .stat-value.critical { font-weight: 800; color: #9d1d00; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .actions.compact .action-btn { min-width: 120px; }
      .action-btn { min-width: 180px; padding: 0.42rem 0.65rem; }
      .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      input, select { padding: 0.35rem; }
      .muted { color: #5e5643; font-size: 0.93rem; margin: 0 0 0.45rem; }
      .game-over { color: #a40000; font-weight: bold; }
      .traveler-panel { margin-top: 1rem; border: 1px solid #ccb892; background: #f2e6cc; padding: 0.8rem; }
      .traveler-option-list { border: 1px solid #ccb892; background: #f8efd9; padding: 0.35rem; max-height: 28vh; overflow-y: auto; display: grid; gap: 0.35rem; }
      .traveler-option-row { border: 1px solid #d4c29b; background: #f5e8cc; padding: 0.3rem; display: flex; align-items: center; justify-content: space-between; gap: 0.35rem; }
      .traveler-option-text { font-size: 0.82rem; color: #3b2f1a; }
      .traveler-option-actions { display: inline-flex; gap: 0.25rem; flex-shrink: 0; }
      .traveler-inline-btn { min-width: auto; padding: 0.2rem 0.35rem; font-size: 0.76rem; }
      .traveler-chat-popout { margin-top: 0.35rem; border: 1px solid #c8b184; background: #f7ebd2; padding: 0.45rem; }
      .traveler-chat-popout h4 { margin: 0 0 0.25rem; font-size: 0.9rem; }
      .traveler-chat { margin-top: 0.25rem; border-top: 1px dashed #b89f72; padding-top: 0.3rem; }


      .main-page { min-height: 100vh; overflow-y: auto; }
      .main-page .layout { min-height: calc(100vh - 1.3rem); gap: 0.75rem; }
      .main-page .chronicles-column { min-height: calc(100vh - 2rem); overflow-y: auto; font-size: 0.9rem; }
      .chronicle-log { max-height: 48vh; overflow-y: auto; border: 1px solid #d2c5a3; background: #f8f1e2; padding: 0.35rem 0.45rem; display: grid; gap: 0.5rem; }
      .chronicle-day { border-top: 2px solid #c7b38a; padding-top: 0.4rem; }
      .chronicle-day:first-child { border-top: none; padding-top: 0.1rem; }
      .chronicle-day-head { margin: 0 0 0.2rem; font-weight: 700; color: #2f2719; }
      .chronicle-day-text { margin: 0; color: #3f3522; line-height: 1.35; }
      .chronicle-good { color: #1f6b2b; font-weight: 600; }
      .chronicle-bad { color: #9a1f1f; font-weight: 600; }
      .chronicle-neutral { color: #4a3f2a; }
      .main-page .chronicles-column ul { margin: 0.2rem 0 0.5rem 1rem; }
      .main-page .options-column { font-size: 0.93rem; }
      .main-page h1 { margin: 0.15rem 0 0.25rem; font-size: 1.45rem; }
      .main-page h3 { margin: 0.35rem 0 0.25rem; font-size: 1rem; }
      .main-page .muted { margin: 0 0 0.25rem; font-size: 0.85rem; }
      .main-page .stats { gap: 0.4rem; }
      .main-page .stats-box { padding: 0.48rem 0.58rem; }
      .main-page .stats-columns { gap: 0.7rem; grid-template-columns: minmax(170px, 1fr) minmax(210px, 1fr); }
      .main-page .stat-group h4 { margin: 0 0 0.2rem; font-size: 0.92rem; }
      .main-page section { margin-bottom: 0.35rem; }
      .main-page .actions { gap: 6px; }
      .main-page .action-btn { min-width: 135px; padding: 0.28rem 0.45rem; font-size: 0.82rem; }
      .main-page input, .main-page select { padding: 0.25rem; font-size: 0.82rem; }
      .advancement-page { background: #ebe7df; border: 1px solid #c6c0b4; padding: 0.9rem; }
      .adv-legend { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.55rem 0 0.8rem; }
      .adv-legend-item { display: inline-flex; }
      .adv-swatch { display: inline-flex; align-items: center; justify-content: center; min-width: 90px; padding: 0.15rem 0.45rem; font-size: 0.82rem; border-radius: 3px; }
      .advancement-tree { display: grid; gap: 0.9rem; }
      .adv-lane { background: #d8d4cd; border: 1px solid #aca79a; padding: 0.7rem; }
      .adv-lane h3 { margin: 0 0 0.45rem; color: #2f2d2a; }
      .adv-flow { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
      .adv-node-wrap { display: flex; align-items: center; gap: 0.35rem; }
      .adv-node { position: relative; background: #c9c5be; border: 1px solid #8d8a83; color: #1f1e1b; padding: 0.35rem 0.75rem; font-weight: 600; font-family: inherit; cursor: pointer; }
      .adv-node-done { background: #9f998f; border: 1px solid #59554f; color: #171612; }
      .adv-node-available { border: 2px solid #6a675f; box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.25) inset; }
      .adv-node-locked { opacity: 0.45; border: 1px dashed #6f6b63; }
      .adv-node-next { outline: 3px solid #c9a94b; outline-offset: 1px; }
      .adv-corner-check { position: absolute; top: -0.35rem; right: -0.35rem; width: 1.1rem; height: 1.1rem; border-radius: 50%; background: #2f5f30; color: #f2f7ee; font-size: 0.75rem; display: inline-flex; align-items: center; justify-content: center; border: 1px solid #173417; }
      .adv-next-tag { position: absolute; left: 50%; transform: translateX(-50%); bottom: -1rem; background: #c9a94b; color: #2d2411; border: 1px solid #856b2c; font-size: 0.65rem; padding: 0 0.3rem; border-radius: 2px; }
      .adv-link { color: #3f3d38; font-weight: 700; }
      .adv-details { margin-top: 1.4rem; background: #e1dbcf; border: 1px solid #aea592; padding: 0.65rem 0.75rem; }
      .adv-details h3 { margin: 0 0 0.35rem; }
      .adv-details p { margin: 0.4rem 0 0.2rem; }
      .adv-details ul { margin: 0.2rem 0 0.4rem 1.2rem; }
      .townmap-layout { display: grid; gap: 0.7rem; }
      .townmap-layout.full-map {
        min-height: calc(100vh - 1rem);
        padding: 0;
        border: none;
        background: transparent;
      }
      .townmap-canvas { padding: 0.55rem; }
      .townmap-canvas.full-map {
        position: relative;
        min-height: calc(100vh - 1rem);
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
      }
      .town-map-scene {
        position: relative;
        min-height: calc(100vh - 1rem);
        border: 2px solid #6f8c5a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        background:
          radial-gradient(circle at 50% 52%, rgba(202, 170, 124, 0.72) 0%, rgba(188, 153, 106, 0.6) 21%, rgba(172, 206, 140, 0.2) 46%, rgba(140, 177, 110, 0.65) 100%),
          radial-gradient(circle at 12% 15%, rgba(68, 108, 56, 0.48) 0%, rgba(68, 108, 56, 0) 28%),
          radial-gradient(circle at 87% 14%, rgba(66, 104, 54, 0.45) 0%, rgba(66, 104, 54, 0) 25%),
          radial-gradient(circle at 14% 86%, rgba(66, 104, 54, 0.42) 0%, rgba(66, 104, 54, 0) 24%),
          radial-gradient(circle at 87% 88%, rgba(66, 104, 54, 0.42) 0%, rgba(66, 104, 54, 0) 24%),
          linear-gradient(180deg, #a7c985 0%, #8eb56a 100%);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2), inset 0 0 85px rgba(41, 70, 33, 0.48);
      }
      .town-map-scene::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0 4px, rgba(0, 0, 0, 0.02) 4px 8px);
      }

      .townmap-hud {
        position: absolute;
        top: 0.8rem;
        left: 0.8rem;
        z-index: 5;
        width: min(560px, calc(100% - 1.6rem));
        background: rgba(236, 225, 195, 0.88);
        border: 1px solid #9d8a61;
        padding: 0.55rem 0.65rem;
        box-shadow: 0 2px 8px rgba(40, 33, 22, 0.2);
      }
      .townmap-hud h1 { margin: 0 0 0.2rem; }
      .townmap-hud .muted { margin-bottom: 0.35rem; }
      .townmap-panels {
        position: absolute;
        right: 0.8rem;
        bottom: 0.8rem;
        z-index: 5;
        width: min(390px, calc(100% - 1.6rem));
        display: grid;
        gap: 0.45rem;
      }
      .townmap-panels .stats-box {
        background: rgba(239, 231, 210, 0.92);
        border: 1px dashed #8b7b57;
      }
      .map-feature {
        position: absolute;
        z-index: 2;
        font-size: 0.72rem;
        line-height: 1.1;
        color: #2a2417;
        border: 1px solid #7f6a45;
        background: #e7d8b7;
        padding: 0.18rem 0.35rem;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.25) inset;
      }
      .map-feature.hidden { display: none; }
      .town-map-scene .hidden { display: none; }
      .map-feature.sleeping-spot {
        left: 42%;
        top: 58%;
        border-radius: 10px;
        background: linear-gradient(180deg, #d7c59d 0%, #c2ae83 100%);
        border-color: #7e6840;
      }
      .map-feature.sleeping-spot::before {
        content: '';
        position: absolute;
        left: -8px;
        right: -8px;
        top: 42%;
        height: 3px;
        background: rgba(96, 76, 42, 0.35);
      }
      .map-feature.campfire {
        left: 48%;
        top: 50%;
        border-radius: 50%;
        width: 46px;
        height: 46px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        background: radial-gradient(circle, #ffd999 0%, #df8d3a 40%, #7e4d25 72%, #5f3b1d 100%);
        color: #2d1708;
        border-color: #6d3e1d;
        box-shadow: 0 0 0 2px rgba(93, 62, 27, 0.28), 0 0 14px rgba(224, 133, 51, 0.28);
      }
      .map-feature.campfire::before {
        content: '';
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 1px solid rgba(77, 48, 20, 0.55);
      }
      .map-feature.lean-to { left: 39%; top: 43%; background: #d8c495; }
      .map-feature.well { left: 58%; top: 40%; background: #b7d4da; border-color: #547783; }
      .map-feature.market { left: 60%; top: 56%; background: #d5b8ca; border-color: #8e6480; }
      .map-path {
        position: absolute;
        z-index: 1;
        left: 53%;
        top: 58%;
        width: 31%;
        height: 16px;
        border-radius: 12px;
        transform: rotate(20deg);
        background: linear-gradient(90deg, rgba(169, 134, 89, 0.72) 0%, rgba(160, 123, 78, 0.55) 60%, rgba(143, 112, 71, 0.42) 100%);
      }
      .map-path::after {
        content: '';
        position: absolute;
        inset: 3px 8px;
        border-radius: 10px;
        background: rgba(191, 157, 114, 0.35);
      }
      .map-brush {
        position: absolute;
        z-index: 1;
        border-radius: 55% 45% 52% 48%;
        background: radial-gradient(circle, rgba(58, 99, 48, 0.65) 0%, rgba(48, 82, 40, 0.6) 65%, rgba(48, 82, 40, 0) 100%);
      }
      .map-brush.b1 { left: 6%; top: 8%; width: 78px; height: 54px; }
      .map-brush.b2 { right: 8%; top: 10%; width: 82px; height: 56px; }
      .map-brush.b3 { left: 8%; bottom: 10%; width: 90px; height: 60px; }
      .map-brush.b4 { right: 7%; bottom: 8%; width: 96px; height: 58px; }
      .farm-plots {
        position: absolute;
        right: 11%;
        bottom: 15%;
        z-index: 2;
        border: 1px solid #6d5a39;
        background: rgba(125, 102, 61, 0.36);
        box-shadow: inset 0 0 0 1px rgba(212, 185, 143, 0.32);
        padding: 0.32rem;
        width: 124px;
      }
      .farm-plot-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.18rem;
      }
      .farm-plot-cell {
        height: 16px;
        border: 1px solid #69542f;
      }
      .farm-plots.state-cleared .farm-plot-cell { background: linear-gradient(180deg, #8a663b 0%, #72532e 100%); }
      .farm-plots.state-planted .farm-plot-cell { background: linear-gradient(180deg, #7f5f37 0%, #6d502c 56%, #6e9650 100%); }
      .farm-plots.state-ready .farm-plot-cell { background: linear-gradient(180deg, #8b7147 0%, #6d8741 48%, #9eac56 100%); }
      .farm-plot-label {
        margin-top: 0.2rem;
        font-size: 0.68rem;
        color: #312511;
        text-align: center;
      }
      .map-cottage {
        position: absolute;
        z-index: 2;
        width: 56px;
        height: 38px;
        border: 1px solid #7a633e;
        background: #e3d2a8;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      }
      .map-cottage::before {
        content: '';
        position: absolute;
        left: 8px;
        right: 8px;
        top: -11px;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 12px solid #8c7044;
      }
      .map-cottage span {
        position: absolute;
        left: 3px;
        right: 3px;
        bottom: 2px;
        font-size: 0.62rem;
        text-align: center;
        color: #2d2517;
      }
      .map-cottage.c1 { right: 25%; top: 34%; }
      .map-cottage.c2 { right: 17%; top: 50%; }
      .map-cottage.c3 { left: 25%; top: 62%; }
      .map-cottage.c4 { left: 20%; top: 44%; }
      .cottage-list { display: grid; gap: 0.35rem; max-height: 220px; overflow-y: auto; }
      @media (max-width: 1200px) {
        .stats-columns { grid-template-columns: 1fr; gap: 0.7rem; }
      }
      @media (max-width: 980px) {
        .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 700px) {
        .stats-columns { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
