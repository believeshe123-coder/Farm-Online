<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Online</title>
    <style>
      body { font-family: Georgia, serif; margin: 0; background: #f8f5ea; color: #23201a; }
      .page { max-width: 1200px; margin: 1rem auto; padding: 0 1rem 2rem; line-height: 1.4; }
      .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 1rem; align-items: start; }
      .chronicles-column { background: #f3ebd8; border: 1px solid #d2c5a3; padding: 0.75rem; }
      .chronicles-column h3 { margin: 0.25rem 0 0.5rem; }
      .options-column { min-width: 0; }
      .stats { background: #efe7d2; border: 1px solid #cbbf9f; padding: 0.9rem; }
      .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 0.75rem 1.5rem; font-size: 16px; line-height: 1.35; }
      .stat-group h4 { margin: 0 0 0.35rem; font-size: 1rem; color: #4a3f24; }
      .stat-row { display: flex; justify-content: space-between; gap: 0.9rem; }
      .label { color: #3a3221; }
      .label.key { font-weight: 700; color: #2e271a; }
      .stat-value.critical { font-weight: 800; color: #9d1d00; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .actions.compact .action-btn { min-width: 120px; }
      .action-btn { min-width: 180px; padding: 0.42rem 0.65rem; }
      .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      input, select { padding: 0.35rem; }
      .muted { color: #5e5643; font-size: 0.93rem; margin: 0 0 0.45rem; }
      .game-over { color: #a40000; font-weight: bold; }
      .traveler-panel { margin-top: 1rem; border: 1px solid #ccb892; background: #f2e6cc; padding: 0.8rem; }
      .traveler-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; }
      .traveler-card { border: 1px solid #c7b28b; background: #f8efd9; padding: 0.6rem; }
      .traveler-card p { margin: 0 0 0.35rem; }
      @media (max-width: 980px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
